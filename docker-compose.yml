services:
  app:
    build: .
    platform: linux/amd64
    env_file:
      - ../configs/env/local.env
    ports:
      - "${VOOVI_WEB_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - ./docker/conf.php:/var/www/html/conf.php:ro
      - ./docker/.htaccess:/var/www/html/.htaccess:ro

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    env_file:
      - ../configs/env/local.env
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.2
    env_file:
      - ../configs/env/local.env
    volumes:
      - voovi_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  voovi_mysql:
